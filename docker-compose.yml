version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: nexttradx-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - nexttradx
    # Mongo is NOT exposed to the host — only reachable from the app container.

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexttradx-app
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - mongo
    ports:
      - "127.0.0.1:3000:3000"   # bound to localhost; nginx terminates TLS
    networks:
      - nexttradx

networks:
  nexttradx:
    driver: bridge

volumes:
  mongo_data:
